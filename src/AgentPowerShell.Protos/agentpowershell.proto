syntax = "proto3";

package agentpowershell.v1;

service SessionGateway {
  rpc OpenSession (OpenSessionRequest) returns (OpenSessionResponse);
  rpc ExecuteCommand (CommandRequest) returns (CommandResponse);
}

message OpenSessionRequest {
  string working_directory = 1;
}

message OpenSessionResponse {
  string session_id = 1;
}

message CommandRequest {
  string invocation_name = 1;
  string executable_path = 2;
  repeated string arguments = 3;
  string working_directory = 4;
  bool interactive = 5;
  map<string, string> environment = 6;
}

message CommandResponse {
  int32 exit_code = 1;
  string stdout = 2;
  string stderr = 3;
  string policy_decision = 4;
  string denial_reason = 5;
  repeated EventStream events = 6;
}

message EventStream {
  string event_type = 1;
  string detail = 2;
  string created_at = 3;
}
