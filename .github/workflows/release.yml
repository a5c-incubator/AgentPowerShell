name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version tag to release, for example v1.2.3"
        required: false
        type: string

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: true
  REGISTRY_IMAGE: ghcr.io/a5c-ai/agentpowershell

jobs:
  build-artifacts:
    name: release / artifacts / ${{ matrix.rid }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64
          - linux-x64
          - linux-arm64
          - osx-x64
          - osx-arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore agentpowershell.sln

      - name: Build
        run: dotnet build agentpowershell.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test agentpowershell.sln --configuration Release --no-build

      - name: Publish CLI
        run: dotnet publish src/AgentPowerShell.Cli/AgentPowerShell.Cli.csproj --configuration Release -p:PublishProfile=${{ matrix.rid }}

      - name: Archive artifact
        shell: bash
        run: |
          cd "src/AgentPowerShell.Cli/bin/Release/net9.0/${{ matrix.rid }}/publish"
          if [[ "${{ matrix.rid }}" == win-* ]]; then
            7z a "${{ github.workspace }}/agentpowershell-${{ matrix.rid }}.zip" .
          else
            tar -czf "${{ github.workspace }}/agentpowershell-${{ matrix.rid }}.tar.gz" .
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentpowershell-${{ matrix.rid }}
          path: |
            agentpowershell-${{ matrix.rid }}.zip
            agentpowershell-${{ matrix.rid }}.tar.gz

  docker-release:
    name: release / docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: release / github
    runs-on: ubuntu-latest
    needs:
      - build-artifacts
      - docker-release
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten release assets
        shell: bash
        run: |
          mkdir -p dist
          find release-artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} dist/ \;

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
